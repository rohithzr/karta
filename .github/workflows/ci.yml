name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libprotobuf-dev
        # protobuf-compiler gives us `protoc`; libprotobuf-dev ships the
        # well-known .proto files (google/protobuf/empty.proto, etc.) that
        # lance-encoding's encodings_v2_0.proto imports. Without the -dev
        # package protoc fails with "File not found" on the imports.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # rustfmt and clippy are strict CI gates; formatting or lint warnings fail the run.
      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: nextest
        run: cargo nextest run --workspace --no-fail-fast
        env:
          # The BEAM / LOCOMO / LongMem harnesses are #[ignore]'d and require
          # real Azure OpenAI + Jina credentials. CI never runs them. Only the
          # unit tests + mock-LLM integration tests execute here.
          KARTA_CI: "1"
