default_job = "check"

[jobs.check]
command = ["cargo", "check", "--all-targets"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
need_stdout = false

[jobs.test]
command = ["cargo", "test"]
need_stdout = true
need_stderr = true

[jobs.doc]
command = ["cargo", "doc", "--no-deps"]
need_stdout = false
